<!DOCTYPE html>
<html>
<head>
  <title>BookMe Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    img {
      width: 70px;
      height: 90px;
      object-fit: cover;
    }

    button {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
    }

    .delete {
      background: crimson;
      color: white;
    }

    .edit {
      background: #2563eb;
      color: white;
    }

    .add-link {
      display: inline-block;
      margin-bottom: 20px;
      background: #111827;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h1>BookMe Admin Dashboard</h1>

  <a class="add-link" href="admin.html">+ Add New Book</a>

  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="bookTable"></tbody>
  </table>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
}

if (user.role !== "admin") {
    alert("Access Denied");
    window.location.href = "home.html";
}
    function loadBooks() {
      fetch("http://localhost:5000/api/books/all-books")
      .then(res => res.json())
      .then(books => {
        const table = document.getElementById("bookTable");
        table.innerHTML = "";

        books.forEach(book => {
          table.innerHTML += `
            <tr>
              <td>
                <img src="http://localhost:5000${book.image_url}">
              </td>
              <td>${book.title}</td>
              <td>${book.author}</td>
              <td>Rs. ${book.price}</td>
              <td>${book.stock}</td>
              <td>
               <button class="edit" onclick="window.location.href='edit-book.html?id=${book.id}'">Edit</button>
                <button class="delete" onclick="deleteBook(${book.id})">Delete</button>
              </td>
            </tr>
          `;
        });
      });
    }

    function deleteBook(id) {
      if (!confirm("Are you sure you want to delete this book?")) {
        return;
      }

      fetch(`http://localhost:5000/api/books/delete-book/${id}`, {
        method: "DELETE"
      })
      .then(res => res.json())
      .then(data => {
        alert("Book deleted successfully");
        loadBooks();
      })
      .catch(err => console.log(err));
    }

    loadBooks();
  </script>

</body>
</html>
